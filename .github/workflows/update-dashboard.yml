name: Update Dashboard

on:
  schedule:
    - cron: "0 * * * *"      # every hour
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache HuggingFace model weights (~270 MB total for MiniLM + DeBERTa).
      # Key is static — models don't change between runs.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-v1

      # Persist the SQLite DB across runs so match_verdicts are reused
      # and we don't re-run NLI on already-verified pairs.
      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/operational.sqlite
          key: sqlite-${{ github.run_id }}
          restore-keys: sqlite-

      - name: Install dependencies
        run: pip install -e .

      # Run one fetch → match → store cycle.
      # Ollama is not available in CI; the matcher falls back to NLI-only.
      - name: Fetch and match markets
        env:
          MATCHING_USE_OLLAMA_FALLBACK: "false"
        run: priceshift once

      # Write docs/data/*.json from the updated DB.
      - name: Export JSON for dashboard
        run: priceshift export

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push
